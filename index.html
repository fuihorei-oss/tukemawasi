<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>席管理システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2a;
    --border: #2a2a3d;
    --accent: #c9a84c;
    --accent2: #e8c97a;
    --nomination: #e05a7a;
    --help: #4a9eff;
    --leave: #888;
    --text: #e8e8f0;
    --text-dim: #888899;
    --red: #e05a7a;
    --green: #4dcf8e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201,168,76,0.08) 0%, transparent 60%);
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(19,19,28,0.95);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }

  .header-time {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 0;
    height: calc(100vh - 53px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .cast-count {
    background: var(--accent);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    border-radius: 10px;
    padding: 1px 7px;
  }

  .cast-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .cast-list::-webkit-scrollbar { width: 4px; }
  .cast-list::-webkit-scrollbar-track { background: transparent; }
  .cast-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .cast-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 10px 8px;
    margin-bottom: 6px;
    transition: border-color 0.2s;
  }

  .cast-item:hover { border-color: var(--accent); }

  .cast-name {
    font-weight: 500;
    font-size: 13px;
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cast-name-text {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cast-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
  }

  .cast-actions {
    display: flex;
    gap: 4px;
    margin-bottom: 7px;
    flex-wrap: wrap;
  }

  .cast-actions button {
    background: var(--border);
    border: none;
    color: var(--text-dim);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .cast-actions button:hover {
    background: var(--accent);
    color: #000;
  }

  .cast-table-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }

  .cast-table-btns button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .cast-table-btns button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .add-cast {
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }

  .add-cast input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-cast input:focus { border-color: var(--accent); }
  .add-cast input::placeholder { color: var(--text-dim); }

  .btn-add {
    background: var(--accent);
    border: none;
    color: #000;
    font-weight: 700;
    font-size: 16px;
    width: 32px;
    border-radius: 6px;
    cursor: pointer;
    line-height: 1;
    transition: opacity 0.15s;
  }

  .btn-add:hover { opacity: 0.8; }

  /* MAIN */
  .main {
    overflow-y: auto;
    padding: 16px;
  }

  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tables-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }

  /* TABLE CARD */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
    position: relative;
  }

  .table-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(201,168,76,0.12);
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .table-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--accent);
  }

  .table-timer {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .table-timer.running {
    color: var(--accent2);
    text-shadow: 0 0 10px rgba(232,201,122,0.3);
  }

  .table-controls {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  .btn-timer {
    flex: 1;
    border: none;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 0;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .btn-start {
    background: var(--green);
    color: #000;
  }

  .btn-stop {
    background: var(--red);
    color: #fff;
  }

  .btn-reset {
    background: var(--surface2);
    border: 1px solid var(--border) !important;
    color: var(--text-dim);
    flex: 0.6;
  }

  .btn-reset:hover { border-color: var(--text-dim) !important; color: var(--text); }

  .table-girls {
    padding: 8px;
    min-height: 40px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .empty-table {
    color: var(--text-dim);
    font-size: 11px;
    text-align: center;
    padding: 10px 0;
    letter-spacing: 1px;
  }

  /* ASSIGNED GIRL */
  .assigned {
    border-radius: 6px;
    padding: 7px 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    border: 1px solid transparent;
    opacity: 1;
    transition: opacity 0.2s;
  }

  .assigned.fade { opacity: 0.4; }

  .assigned.nomination {
    background: rgba(224,90,122,0.12);
    border-color: rgba(224,90,122,0.3);
  }

  .assigned.help {
    background: rgba(74,158,255,0.1);
    border-color: rgba(74,158,255,0.25);
  }

  .assigned.leave {
    background: rgba(100,100,120,0.12);
    border-color: rgba(100,100,120,0.2);
  }

  .assigned-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }

  .assigned-name {
    font-weight: 500;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .type-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .nomination .type-badge { background: var(--nomination); color: #fff; }
  .help .type-badge { background: var(--help); color: #fff; }
  .leave .type-badge { background: var(--leave); color: #fff; }

  .assigned-time {
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .assigned-btns {
    display: flex;
    gap: 3px;
  }

  .type-btn {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    flex: 1;
    text-align: center;
  }

  .type-btn:hover { background: var(--surface2); color: var(--text); }

  .type-btn.active-nomination { background: var(--nomination); border-color: var(--nomination); color: #fff; }
  .type-btn.active-help { background: var(--help); border-color: var(--help); color: #fff; }
  .type-btn.active-leave { background: var(--leave); border-color: var(--leave); color: #fff; }

  .remove-btn {
    border: none;
    background: transparent;
    color: #555;
    font-size: 14px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
    margin-left: auto;
  }

  .remove-btn:hover { color: var(--red); }

  .restore-btn {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .restore-btn:hover { border-color: var(--accent); color: var(--accent); }

  .guest-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(201,168,76,0.04);
  }

  .guest-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .guest-counter {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .guest-num {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    min-width: 28px;
    text-align: center;
    line-height: 1;
  }

  .guest-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 15px;
    width: 26px;
    height: 26px;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: all 0.15s;
    font-family: inherit;
  }

  .guest-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .ghost-label {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(136,136,153,0.25);
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* PULSE for active */
  .active-pulse {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 1.5s infinite;
    margin-right: 4px;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    min-width: 260px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .modal h3 {
    font-size: 13px;
    margin-bottom: 12px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .modal input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    margin-bottom: 12px;
  }

  .modal input:focus { border-color: var(--accent); }

  .modal-btns {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .modal-btns button {
    border: none;
    border-radius: 6px;
    padding: 7px 16px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .modal-btns button:hover { opacity: 0.8; }

  .btn-confirm { background: var(--accent); color: #000; }
  .btn-cancel { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border) !important; }
</style>
</head>
<body>

<header>
  <div class="logo">FLOOR MANAGER</div>
  <div class="header-time" id="clock"></div>
</header>

<div class="layout">
  <!-- SIDEBAR: キャスト -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">CAST</span>
      <span class="cast-count" id="castCount">0</span>
    </div>
    <div class="cast-list" id="girls"></div>
    <div class="add-cast">
      <input type="text" id="newGirl" placeholder="キャスト名を追加…" onkeydown="if(event.key==='Enter')addGirl()">
      <button class="btn-add" onclick="addGirl()">+</button>
    </div>
  </div>

  <!-- MAIN: 席 -->
  <div class="main">
    <div class="tables-grid" id="tables"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>キャスト名を編集</h3>
    <input type="text" id="editInput" placeholder="新しい名前">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-confirm" onclick="confirmEdit()">保存</button>
    </div>
  </div>
</div>

<script>
let state = {
  girls: ["A", "B", "C"],
  tables: {}
};

let editTarget = null;

/* ── 永続化 ── */
function save() {
  localStorage.setItem("floorState", JSON.stringify(state));
}

function load() {
  try {
    const d = localStorage.getItem("floorState");
    if (d) state = JSON.parse(d);
  } catch(e) {}
}

load();

/* ── 時間フォーマット ── */
function formatTime(ms) {
  let s = Math.floor(ms / 1000);
  let h = Math.floor(s / 3600);
  let m = Math.floor((s % 3600) / 60);
  let sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

/* ── 時計 ── */
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

/* ── キャスト表示 ── */
function renderGirls() {
  const g = document.getElementById("girls");
  g.innerHTML = "";

  document.getElementById("castCount").textContent = state.girls.length;

  state.girls.forEach(name => {
    const div = document.createElement("div");
    div.className = "cast-item";

    let tableBtns = "";
    for (let i = 1; i <= 10; i++) {
      tableBtns += `<button onclick="assignToTable('${name}',${i})">席${i}</button>`;
    }

    div.innerHTML = `
      <div class="cast-name">
        <div class="cast-name-text">
          <span class="cast-dot"></span>
          <span>${name}</span>
        </div>
      </div>
      <div class="cast-table-btns">${tableBtns}</div>
      <div class="cast-actions" style="margin-top:6px">
        <button onclick="openEditModal('${name}')">✎ 編集</button>
        <button onclick="deleteGirl('${name}')" style="color:#e05a7a">✕ 削除</button>
      </div>
    `;
    g.appendChild(div);
  });
}

/* ── 席に追加 ── */
function assignToTable(name, tableId) {
  if (!state.tables[tableId]) {
    state.tables[tableId] = { girls: [], time: 0, active: false };
  }
  let target = state.tables[tableId];

  // すでにその席に実体（非ゴースト）がいれば何もしない
  if (target.girls.some(g => g.name === name && !g.isGhost)) return;

  // 他の席での扱いを処理
  Object.entries(state.tables).forEach(([tid, tbl]) => {
    if (Number(tid) === tableId) return;
    tbl.girls.forEach((g, idx) => {
      if (g.name === name && !g.isGhost) {
        if (g.type === "ヘルプ") {
          // ヘルプ → 前の席から完全削除
          g._remove = true;
        } else if (g.type === "指名") {
          // 指名 → ゴースト化（タイマー停止済みとしてフラグ）
          g.isGhost = true;
          g.frozenTime = g.time || 0; // 停止時のタイムを保持
        }
      }
    });
    // _removeフラグのついたエントリを削除
    tbl.girls = tbl.girls.filter(g => !g._remove);
  });

  target.girls.push({ name, type: "ヘルプ", time: 0, active: true, isGhost: false });
  save();
  renderTables();
}

/* ── キャスト追加 ── */
function addGirl() {
  const input = document.getElementById("newGirl");
  const name = input.value.trim();
  if (!name) return;
  if (state.girls.includes(name)) { input.select(); return; }
  state.girls.push(name);
  input.value = "";
  save();
  render();
}

/* ── 編集モーダル ── */
function openEditModal(name) {
  editTarget = name;
  document.getElementById("editInput").value = name;
  document.getElementById("editModal").classList.add("show");
  setTimeout(() => document.getElementById("editInput").focus(), 50);
}

function closeModal() {
  document.getElementById("editModal").classList.remove("show");
  editTarget = null;
}

function confirmEdit() {
  const newName = document.getElementById("editInput").value.trim();
  if (!newName || !editTarget) { closeModal(); return; }
  const oldName = editTarget;

  state.girls = state.girls.map(g => g === oldName ? newName : g);
  Object.values(state.tables).forEach(t => {
    t.girls.forEach(g => { if (g.name === oldName) g.name = newName; });
  });

  closeModal();
  save();
  render();
}

// ESCキーでモーダルを閉じる
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
  if (e.key === "Enter" && document.getElementById("editModal").classList.contains("show")) confirmEdit();
});

/* ── キャスト削除 ── */
function deleteGirl(name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  state.girls = state.girls.filter(g => g !== name);
  Object.values(state.tables).forEach(t => {
    t.girls = t.girls.filter(g => g.name !== name);
  });
  save();
  render();
}

/* ── 席表示 ── */
function renderTables() {
  const container = document.getElementById("tables");
  container.innerHTML = "";

  for (let i = 1; i <= 10; i++) {
    if (!state.tables[i]) {
      state.tables[i] = { girls: [], time: 0, active: false };
    }

    const tbl = state.tables[i];
    const card = document.createElement("div");
    card.className = "table-card" + (tbl.active ? " active" : "");

    let girlsHtml = "";
    if (tbl.girls.length === 0) {
      girlsHtml = `<div class="empty-table">— 空席 —</div>`;
    } else {
      tbl.girls.forEach((g, idx) => {
        const cls = g.type === "指名" ? "nomination" : g.type === "一時離席" ? "leave" : "help";
        const fade = g.isGhost ? " fade" : "";
        // ゴースト（指名の離席中）は停止時の時間を表示
        const displayTime = g.isGhost
          ? (g.frozenTime !== undefined ? formatTime(g.frozenTime) : formatTime(g.time || 0))
          : formatTime(g.time || 0);

        girlsHtml += `
          <div class="assigned ${cls}${fade}">
            <div class="assigned-top">
              <div class="assigned-name">
                <span>${g.name}</span>
                <span class="type-badge">${g.type}</span>
                ${g.isGhost ? '<span class="ghost-label">移動中</span>' : ''}
              </div>
              <div style="display:flex;align-items:center;gap:4px">
                <span class="assigned-time">${g.isGhost ? '⏸ ' : ''}${displayTime}</span>
                <button class="remove-btn" onclick="removeGirl(${i},${idx})" title="退席">✕</button>
              </div>
            </div>
            ${g.isGhost ? `
              <div class="assigned-btns">
                <button class="restore-btn" onclick="restore(${i},${idx})">↩ 戻す</button>
              </div>
            ` : `
            <div class="assigned-btns">
              <button class="type-btn ${g.type==='指名'?'active-nomination':''}" onclick="setType(${i},${idx},'指名')">指名</button>
              <button class="type-btn ${g.type==='ヘルプ'?'active-help':''}" onclick="setType(${i},${idx},'ヘルプ')">ヘルプ</button>
              <button class="type-btn ${g.type==='一時離席'?'active-leave':''}" onclick="setType(${i},${idx},'一時離席')">離席</button>
            </div>
            `}
          </div>
        `;
      });
    }

    const guestCount = tbl.guests || 0;
    card.innerHTML = `
      <div class="table-header">
        <div style="display:flex;align-items:center;gap:6px">
          ${tbl.active ? '<span class="active-pulse"></span>' : ''}
          <span class="table-num">席 ${i}</span>
        </div>
        <span class="table-timer ${tbl.active ? 'running' : ''}">${formatTime(tbl.time)}</span>
      </div>
      <div class="table-controls">
        <button class="btn-timer ${tbl.active ? 'btn-stop' : 'btn-start'}" onclick="toggleTimer(${i})">
          ${tbl.active ? '■ 停止' : '▶ 開始'}
        </button>
        <button class="btn-timer btn-reset" onclick="resetTimer(${i})">↺ リセット</button>
      </div>
      <div class="guest-row">
        <span class="guest-label">👤 客数</span>
        <div class="guest-counter">
          <button class="guest-btn" onclick="changeGuests(${i},-1)">−</button>
          <span class="guest-num">${guestCount}</span>
          <button class="guest-btn" onclick="changeGuests(${i},1)">＋</button>
        </div>
      </div>
      <div class="table-girls">${girlsHtml}</div>
    `;

    container.appendChild(card);
  }
}

/* ── 客数変更 ── */
function changeGuests(tableId, delta) {
  if (!state.tables[tableId]) return;
  const current = state.tables[tableId].guests || 0;
  state.tables[tableId].guests = Math.max(0, current + delta);
  save();
  renderTables();
}

/* ── タイプ変更 ── */
function setType(tableId, index, type) {
  state.tables[tableId].girls[index].type = type;
  save();
  renderTables();
}

/* ── 削除 ── */
function removeGirl(tableId, index) {
  state.tables[tableId].girls.splice(index, 1);
  save();
  renderTables();
}

/* ── 戻す（指名ゴーストを復活） ── */
function restore(tableId, index) {
  const g = state.tables[tableId].girls[index];

  // ゴーストを実体に戻し、保存していた時間を復元してタイマー再開
  g.isGhost = false;
  if (g.frozenTime !== undefined) {
    g.time = g.frozenTime;
    delete g.frozenTime;
  }

  save();
  renderTables();
}

/* ── タイマー ── */
function toggleTimer(id) {
  state.tables[id].active = !state.tables[id].active;
  save();
  renderTables();
}

function resetTimer(id) {
  state.tables[id] = { girls: [], time: 0, active: false };
  save();
  renderTables();
}

/* ── 全体レンダリング ── */
function render() {
  renderGirls();
  renderTables();
}

render();

/* ── タイマー更新 ── */
setInterval(() => {
  let changed = false;
  Object.values(state.tables).forEach(t => {
    if (t.active) {
      t.time += 1000;
      t.girls.forEach(g => {
        // ゴースト（指名の離席中）はタイマー停止、一時離席もカウントしない
        if (!g.isGhost && g.type !== "一時離席") {
          g.time = (g.time || 0) + 1000;
        }
      });
      changed = true;
    }
  });
  if (changed) {
    save();
    renderTables();
  }
}, 1000);
</script>
</body>
</html>
